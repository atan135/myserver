name: Database Migration Gate

on:
  pull_request:
    paths:
      - ".github/workflows/database-migration.yml"
      - "package.json"
      - "package-lock.json"
      - "db/**"
      - "scripts/db-deploy.ps1"
      - "tools/db.js"
      - "tools/db-deploy.js"
      - "tools/db-lock-runner.js"
      - "tools/db-migration-metrics.js"
      - "tools/db-stage7-drill.js"
      - "tools/db-stage7-worker.js"
      - "tests/db/**"
      - "tests/fixtures/db/**"
      - "apps/metrics-collector/src/**"
      - "apps/metrics-collector/package.json"
      - "docs/数据库/**"
  push:
    paths:
      - ".github/workflows/database-migration.yml"
      - "package.json"
      - "package-lock.json"
      - "db/**"
      - "scripts/db-deploy.ps1"
      - "tools/db.js"
      - "tools/db-deploy.js"
      - "tools/db-lock-runner.js"
      - "tools/db-migration-metrics.js"
      - "tools/db-stage7-drill.js"
      - "tools/db-stage7-worker.js"
      - "tests/db/**"
      - "tests/fixtures/db/**"
      - "apps/metrics-collector/src/**"
      - "apps/metrics-collector/package.json"
      - "docs/数据库/**"

jobs:
  static-gate:
    name: Windows database migration static gate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install locked Node.js dependencies
        run: npm ci
      - name: Validate database deployment gate
        run: npm run db:ci
