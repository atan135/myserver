syntax = "proto3";

package myserver.admin;

message ServerStatusReq {}

message ServerStatusRes {
  uint64 connection_count = 1;
  uint64 room_count = 2;
  string status = 3;
  uint64 max_body_len = 4;
  uint64 heartbeat_timeout_secs = 5;
}

message UpdateConfigReq {
  string key = 1;
  string value = 2;
}

message UpdateConfigRes {
  bool ok = 1;
  string error_code = 2;
}

// Signed envelope carried immediately before an internal admin write request.
// The current TCP/HTTP transports use the JSON representation of these fields
// while the protobuf definition is the stable cross-service contract.
message AdminOperationAssertion {
  uint32 version = 1;
  string operation_id = 2;
  string request_id = 3;
  string trace_id = 4;
  string issuer = 5;
  string key_id = 6;
  string actor_id = 7;
  string permission = 8;
  string scope_json = 9;
  string target_json = 10;
  string service = 11;
  string instance_id = 12;
  int64 issued_at_ms = 13;
  int64 expires_at_ms = 14;
  bytes payload_sha256 = 15;
  bytes signature = 16;
}

// Dedicated mail-service assertion. It is intentionally not an admin assertion:
// it can authorize only a persisted mail attachment grant or its result query.
message MailAttachmentGrantAssertion {
  uint32 version = 1;
  string operation_id = 2;
  string request_id = 3;
  string mail_id = 4;
  string character_id = 5;
  string attachment_fingerprint = 6;
  string issuer = 7;
  string key_id = 8;
  string service = 9;
  string service_instance_id = 10;
  string target_service = 11;
  string target_instance_id = 12;
  int64 issued_at_ms = 13;
  int64 expires_at_ms = 14;
  bytes payload_sha256 = 15;
  bytes signature = 16;
}

message GrantItem {
  int32 item_id = 1;
  uint32 count = 2;
  bool binded = 3;
}

message GrantItemsReq {
  string request_id = 1;
  string character_id = 2;
  repeated GrantItem items = 3;
  string source = 4;
  string reason = 5;
  string mail_id = 6;
  string request_fingerprint = 7;
  string trace_id = 8;
  string route_generation = 9;
  string route_token = 10;
  // Zero is the original v1 wire shape. Mail claim callers now send one explicitly
  // so rolling-upgrade peers remain compatible.
  uint32 contract_version = 11;
}

message GrantItemsResultSummary {
  string character_id = 1;
  string source = 2;
  repeated GrantItem items = 3;
}

message GrantItemsRes {
  bool ok = 1;
  string error_code = 2;
  bool applied = 3;
  string request_id = 4;
  string request_fingerprint = 5;
  string error_category = 6;
  string result_state = 7;
  bool retryable = 8;
  GrantItemsResultSummary result_summary = 9;
  string trace_id = 10;
  // A capacity-blocked mail claim is not infrastructure-retryable, but a player
  // may retry the same frozen request after clearing inventory space.
  bool player_retryable = 11;
}

message GrantItemsResultQueryReq {
  string request_id = 1;
  string request_fingerprint = 2;
  string trace_id = 3;
}

message GrantItemsResultQueryRes {
  bool ok = 1;
  string query_status = 2;
  string request_id = 3;
  string request_fingerprint = 4;
  string error_code = 5;
  string error_category = 6;
  string result_state = 7;
  bool retryable = 8;
  GrantItemsResultSummary result_summary = 9;
  string trace_id = 10;
  int64 created_at_ms = 11;
  uint32 contract_version = 12;
}
