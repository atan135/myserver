syntax = "proto3";

package myserver.admin;

message ServerStatusReq {}

message ServerStatusRes {
  uint64 connection_count = 1;
  uint64 room_count = 2;
  string status = 3;
  uint64 max_body_len = 4;
  uint64 heartbeat_timeout_secs = 5;
}

message UpdateConfigReq {
  string key = 1;
  string value = 2;
}

message UpdateConfigRes {
  bool ok = 1;
  string error_code = 2;
}

message GrantItem {
  int32 item_id = 1;
  uint32 count = 2;
  bool binded = 3;
}

message GrantItemsReq {
  string request_id = 1;
  string player_id = 2;
  repeated GrantItem items = 3;
  string source = 4;
  string reason = 5;
}

message GrantItemsRes {
  bool ok = 1;
  string error_code = 2;
  bool applied = 3;
}
