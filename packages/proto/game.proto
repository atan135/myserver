syntax = "proto3";

package myserver.game;

enum MemberRole {
  MEMBER_ROLE_PLAYER = 0;
  MEMBER_ROLE_OBSERVER = 1;
}

message AuthReq {
  string ticket = 1;
}

message AuthRes {
  bool ok = 1;
  string player_id = 2;
  string error_code = 3;
}

message PingReq {
  int64 client_time = 1;
}

message PingRes {
  int64 server_time = 1;
}

message RoomJoinReq {
  string room_id = 1;
  string policy_id = 2;
}

message RoomJoinRes {
  bool ok = 1;
  string room_id = 2;
  string error_code = 3;
}

message RoomLeaveReq {}

message RoomLeaveRes {
  bool ok = 1;
  string room_id = 2;
  string error_code = 3;
}

message RoomReadyReq {
  bool ready = 1;
}

message RoomReadyRes {
  bool ok = 1;
  string room_id = 2;
  bool ready = 3;
  string error_code = 4;
}

message RoomStartReq {}

message RoomStartRes {
  bool ok = 1;
  string room_id = 2;
  string error_code = 3;
}

message PlayerInputReq {
  uint32 frame_id = 1;
  string action = 2;
  string payload_json = 3;
}

message PlayerInputRes {
  bool ok = 1;
  string room_id = 2;
  string error_code = 3;
}

enum MoveInputType {
  MOVE_INPUT_TYPE_UNKNOWN = 0;
  MOVE_INPUT_TYPE_MOVE_DIR = 1;
  MOVE_INPUT_TYPE_MOVE_STOP = 2;
  MOVE_INPUT_TYPE_FACE_TO = 3;
}

message MoveInputReq {
  uint32 frame_id = 1;
  MoveInputType input_type = 2;
  float dir_x = 3;
  float dir_y = 4;
}

message MoveInputRes {
  bool ok = 1;
  string room_id = 2;
  string error_code = 3;
}

message GetRoomDataReq {
  int32 id_start = 1;
  int32 id_end = 2;
}

message GetRoomDataRes {
  bool ok = 1;
  repeated string field_0_list = 2;
  string error_code = 3;
}

message FrameInput {
  string player_id = 1;
  string action = 2;
  string payload_json = 3;
}

message FrameBundlePush {
  string room_id = 1;
  uint32 frame_id = 2;
  uint32 fps = 3;
  repeated FrameInput inputs = 4;
  bool is_silent_frame = 5;
  RoomSnapshot snapshot = 6;
}

message RoomFrameRatePush {
  string room_id = 1;
  uint32 fps = 2;
  string reason = 3;
}

message GameMessagePush {
  string event = 1;
  string room_id = 2;
  string player_id = 3;
  string action = 4;
  string payload_json = 5;
}

message RoomEndReq {
  string reason = 1;
}

message RoomEndRes {
  bool ok = 1;
  string room_id = 2;
  string error_code = 3;
}

message RoomMember {
  string player_id = 1;
  bool ready = 2;
  bool is_owner = 3;
  bool offline = 4;
  MemberRole role = 5;
}

message RoomSnapshot {
  string room_id = 1;
  string owner_player_id = 2;
  string state = 3;
  repeated RoomMember members = 4;
  uint32 current_frame_id = 5;
  string game_state = 6;
}

message EntityTransform {
  uint64 entity_id = 1;
  string player_id = 2;
  int32 scene_id = 3;
  float x = 4;
  float y = 5;
  float dir_x = 6;
  float dir_y = 7;
  bool moving = 8;
  uint32 last_input_frame = 9;
}

message RoomStatePush {
  string event = 1;
  RoomSnapshot snapshot = 2;
}

message MovementSnapshotPush {
  string room_id = 1;
  uint32 frame_id = 2;
  repeated EntityTransform entities = 3;
  bool full_sync = 4;
  string reason = 5;
}

message MovementRejectPush {
  string room_id = 1;
  uint32 frame_id = 2;
  string player_id = 3;
  string error_code = 4;
  EntityTransform corrected = 5;
}

message RoomJoinAsObserverReq {
  string room_id = 1;
}

message RoomJoinAsObserverRes {
  bool ok = 1;
  string room_id = 2;
  string error_code = 3;
  RoomSnapshot snapshot = 4;
  uint32 current_frame_id = 5;
  repeated FrameInput recent_inputs = 6;
}

message RoomReconnectReq {
  string player_id = 1;
}

message RoomReconnectRes {
  bool ok = 1;
  string room_id = 2;
  string error_code = 3;
  RoomSnapshot snapshot = 4;
  uint32 current_frame_id = 5;
  repeated FrameInput recent_inputs = 6;
}

message RoomMemberOfflinePush {
  string room_id = 1;
  string player_id = 2;
  bool offline = 3;
}

message CreateMatchedRoomReq {
  string match_id = 1;
  string room_id = 2;
  repeated string player_ids = 3;
  string mode = 4;
}

message CreateMatchedRoomRes {
  bool ok = 1;
  string room_id = 2;
  string error_code = 3;
  RoomSnapshot snapshot = 4;
}

message ErrorRes {
  string error_code = 1;
  string message = 2;
}

// ========== 物品基础结构 ==========

message Item {
  uint64 uid = 1;
  int32 item_id = 2;
  uint32 count = 3;
  bool binded = 4;
}

message AttrPanel {
  int64 hp = 1;
  int64 max_hp = 2;
  int64 attack = 3;
  int64 defense = 4;
  int32 speed = 5;
  float crit_rate = 6;
  float crit_dmg = 7;
}

message AttrRecord {
  string source = 1;
  string attr_type = 2;
  int32 value = 3;
}

// ========== 物品操作 ==========

message ItemEquipReq {
  uint64 item_uid = 1;
  string equip_slot = 2;
}

message ItemEquipRes {
  bool ok = 1;
  string error_code = 2;
  Item unequipped_item = 3;
}

message ItemUseReq {
  uint64 item_uid = 1;
}

message ItemUseRes {
  bool ok = 1;
  string error_code = 2;
  int64 hp_change = 3;
  repeated int32 new_buff_ids = 4;
}

message ItemDiscardReq {
  uint64 item_uid = 1;
  uint32 count = 2;
}

message ItemDiscardRes {
  bool ok = 1;
  string error_code = 2;
}

message ItemAddReq {
  int32 item_id = 1;
  uint32 count = 2;
  bool binded = 3;
}

message ItemAddRes {
  bool ok = 1;
  string error_code = 2;
  Item item = 3;
}

message WarehouseAccessReq {
  string action = 1;
  uint64 item_uid = 2;
  uint32 count = 3;
}

message WarehouseAccessRes {
  bool ok = 1;
  string error_code = 2;
}

message GetInventoryReq {
}

message GetInventoryRes {
  bool ok = 1;
  string error_code = 2;
  repeated Item inventory_items = 3;
  repeated Item warehouse_items = 4;
}

// ========== 推送消息 ==========

message InventoryUpdatePush {
  repeated Item inventory_items = 1;
  repeated Item warehouse_items = 2;
}

message AttrChangePush {
  AttrPanel base = 1;
  repeated AttrRecord bonus = 2;
  AttrPanel final_ = 3;
}

message VisualChangePush {
  uint32 appearance = 1;
  repeated int32 active_buff_ids = 2;
}

message ItemObtainPush {
  repeated Item items = 1;
  string source = 2;
}
