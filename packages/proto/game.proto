syntax = "proto3";

package myserver.game;

enum MemberRole {
  MEMBER_ROLE_PLAYER = 0;
  MEMBER_ROLE_OBSERVER = 1;
}

message AuthReq {
  string ticket = 1;
}

message AuthRes {
  bool ok = 1;
  string player_id = 2;
  string error_code = 3;
}

message PingReq {
  int64 client_time = 1;
}

message PingRes {
  int64 server_time = 1;
}

message RoomJoinReq {
  string room_id = 1;
}

message RoomJoinRes {
  bool ok = 1;
  string room_id = 2;
  string error_code = 3;
}

message RoomLeaveReq {}

message RoomLeaveRes {
  bool ok = 1;
  string room_id = 2;
  string error_code = 3;
}

message RoomReadyReq {
  bool ready = 1;
}

message RoomReadyRes {
  bool ok = 1;
  string room_id = 2;
  bool ready = 3;
  string error_code = 4;
}

message RoomStartReq {}

message RoomStartRes {
  bool ok = 1;
  string room_id = 2;
  string error_code = 3;
}

message PlayerInputReq {
  uint32 frame_id = 1;
  string action = 2;
  string payload_json = 3;
}

message PlayerInputRes {
  bool ok = 1;
  string room_id = 2;
  string error_code = 3;
}

message GetRoomDataReq {
  int32 id_start = 1;
  int32 id_end = 2;
}

message GetRoomDataRes {
  bool ok = 1;
  repeated string field_0_list = 2;
  string error_code = 3;
}

message FrameInput {
  string player_id = 1;
  string action = 2;
  string payload_json = 3;
}

message FrameBundlePush {
  string room_id = 1;
  uint32 frame_id = 2;
  uint32 fps = 3;
  repeated FrameInput inputs = 4;
  bool is_silent_frame = 5;
  RoomSnapshot snapshot = 6;
}

message RoomFrameRatePush {
  string room_id = 1;
  uint32 fps = 2;
  string reason = 3;
}

message GameMessagePush {
  string event = 1;
  string room_id = 2;
  string player_id = 3;
  string action = 4;
  string payload_json = 5;
}

message RoomEndReq {
  string reason = 1;
}

message RoomEndRes {
  bool ok = 1;
  string room_id = 2;
  string error_code = 3;
}

message RoomMember {
  string player_id = 1;
  bool ready = 2;
  bool is_owner = 3;
  bool offline = 4;
  MemberRole role = 5;
}

message RoomSnapshot {
  string room_id = 1;
  string owner_player_id = 2;
  string state = 3;
  repeated RoomMember members = 4;
  uint32 current_frame_id = 5;
  string game_state = 6;
}

message RoomStatePush {
  string event = 1;
  RoomSnapshot snapshot = 2;
}

message RoomJoinAsObserverReq {
  string room_id = 1;
}

message RoomJoinAsObserverRes {
  bool ok = 1;
  string room_id = 2;
  string error_code = 3;
  RoomSnapshot snapshot = 4;
  uint32 current_frame_id = 5;
  repeated FrameInput recent_inputs = 6;
}

message RoomReconnectReq {
  string player_id = 1;
}

message RoomReconnectRes {
  bool ok = 1;
  string room_id = 2;
  string error_code = 3;
  RoomSnapshot snapshot = 4;
  uint32 current_frame_id = 5;
  repeated FrameInput recent_inputs = 6;
}

message RoomMemberOfflinePush {
  string room_id = 1;
  string player_id = 2;
  bool offline = 3;
}

message CreateMatchedRoomReq {
  string match_id = 1;
  string room_id = 2;
  repeated string player_ids = 3;
  string mode = 4;
}

message CreateMatchedRoomRes {
  bool ok = 1;
  string room_id = 2;
  string error_code = 3;
  RoomSnapshot snapshot = 4;
}

message ErrorRes {
  string error_code = 1;
  string message = 2;
}
