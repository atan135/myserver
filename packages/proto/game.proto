syntax = "proto3";

package myserver.game;

message AuthReq {
  string ticket = 1;
}

message AuthRes {
  bool ok = 1;
  string player_id = 2;
  string error_code = 3;
}

message PingReq {
  int64 client_time = 1;
}

message PingRes {
  int64 server_time = 1;
}

message RoomJoinReq {
  string room_id = 1;
}

message RoomJoinRes {
  bool ok = 1;
  string room_id = 2;
  string error_code = 3;
}

message RoomLeaveReq {}

message RoomLeaveRes {
  bool ok = 1;
  string room_id = 2;
  string error_code = 3;
}

message RoomReadyReq {
  bool ready = 1;
}

message RoomReadyRes {
  bool ok = 1;
  string room_id = 2;
  bool ready = 3;
  string error_code = 4;
}

message RoomStartReq {}

message RoomStartRes {
  bool ok = 1;
  string room_id = 2;
  string error_code = 3;
}

message PlayerInputReq {
  string action = 1;
  string payload_json = 2;
}

message PlayerInputRes {
  bool ok = 1;
  string room_id = 2;
  string error_code = 3;
}

message GameMessagePush {
  string event = 1;
  string room_id = 2;
  string player_id = 3;
  string action = 4;
  string payload_json = 5;
}

message RoomEndReq {
  string reason = 1;
}

message RoomEndRes {
  bool ok = 1;
  string room_id = 2;
  string error_code = 3;
}

message RoomMember {
  string player_id = 1;
  bool ready = 2;
  bool is_owner = 3;
}

message RoomSnapshot {
  string room_id = 1;
  string owner_player_id = 2;
  string state = 3;
  repeated RoomMember members = 4;
}

message RoomStatePush {
  string event = 1;
  RoomSnapshot snapshot = 2;
}

message ErrorRes {
  string error_code = 1;
  string message = 2;
}
