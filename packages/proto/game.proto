syntax = "proto3";

package myserver.game;

enum MemberRole {
  MEMBER_ROLE_PLAYER = 0;
  MEMBER_ROLE_OBSERVER = 1;
}

message AuthReq {
  string ticket = 1;
}

message AuthRes {
  bool ok = 1;
  // Account-level player id for login/session ownership.
  string player_id = 2;
  string error_code = 3;
}

message PingReq {
  int64 client_time = 1;
}

message PingRes {
  int64 server_time = 1;
}

message RoomJoinReq {
  string room_id = 1;
  string policy_id = 2;
}

message RoomJoinRes {
  bool ok = 1;
  string room_id = 2;
  string error_code = 3;
}

message RoomLeaveReq {}

message RoomLeaveRes {
  bool ok = 1;
  string room_id = 2;
  string error_code = 3;
}

message RoomReadyReq {
  bool ready = 1;
}

message RoomReadyRes {
  bool ok = 1;
  string room_id = 2;
  bool ready = 3;
  string error_code = 4;
}

message RoomStartReq {}

message RoomStartRes {
  bool ok = 1;
  string room_id = 2;
  string error_code = 3;
}

message PlayerInputReq {
  uint32 frame_id = 1;
  string action = 2;
  string payload_json = 3;
  int64 client_timestamp_ms = 4;
}

message PlayerInputRes {
  bool ok = 1;
  string room_id = 2;
  string error_code = 3;
}

enum MoveInputType {
  MOVE_INPUT_TYPE_UNKNOWN = 0;
  MOVE_INPUT_TYPE_MOVE_DIR = 1;
  MOVE_INPUT_TYPE_MOVE_STOP = 2;
  MOVE_INPUT_TYPE_FACE_TO = 3;
}

enum MovementCorrectionKind {
  MOVEMENT_CORRECTION_KIND_INCREMENTAL = 0;
  MOVEMENT_CORRECTION_KIND_FULL_SYNC = 1;
  MOVEMENT_CORRECTION_KIND_STRONG = 2;
  MOVEMENT_CORRECTION_KIND_RECOVERY = 3;
}

enum MovementCorrectionReason {
  MOVEMENT_CORRECTION_REASON_UNKNOWN = 0;
  MOVEMENT_CORRECTION_REASON_PERIODIC = 1;
  MOVEMENT_CORRECTION_REASON_CLIENT_DRIFT = 2;
  MOVEMENT_CORRECTION_REASON_MOVEMENT_REJECTED = 3;
  MOVEMENT_CORRECTION_REASON_COLLISION_BLOCKED = 4;
  MOVEMENT_CORRECTION_REASON_GAME_STARTED = 5;
  MOVEMENT_CORRECTION_REASON_RECONNECT_RECOVERY = 6;
  MOVEMENT_CORRECTION_REASON_OBSERVER_RECOVERY = 7;
  MOVEMENT_CORRECTION_REASON_PLAYER_OFFLINE = 8;
  MOVEMENT_CORRECTION_REASON_CONTROL_TIMEOUT = 9;
}

message MoveInputReq {
  uint32 frame_id = 1;
  MoveInputType input_type = 2;
  float dir_x = 3;
  float dir_y = 4;
  bool has_client_state = 5;
  float client_x = 6;
  float client_y = 7;
  uint32 client_frame_id = 8;
  int64 client_timestamp_ms = 9;
}

message MoveInputRes {
  bool ok = 1;
  string room_id = 2;
  string error_code = 3;
}

message GetRoomDataReq {
  int32 id_start = 1;
  int32 id_end = 2;
}

message GetRoomDataRes {
  bool ok = 1;
  repeated string field_0_list = 2;
  string error_code = 3;
}

message FrameInput {
  // Ticket-bound gameplay character id.
  string character_id = 1;
  string action = 2;
  string payload_json = 3;
  uint32 frame_id = 4;
}

message FrameBundlePush {
  string room_id = 1;
  uint32 frame_id = 2;
  uint32 fps = 3;
  repeated FrameInput inputs = 4;
  bool is_silent_frame = 5;
  RoomSnapshot snapshot = 6;
}

message RoomFrameRatePush {
  string room_id = 1;
  uint32 fps = 2;
  string reason = 3;
}

message GameMessagePush {
  string event = 1;
  string room_id = 2;
  // Ticket-bound gameplay character id.
  string character_id = 3;
  string action = 4;
  string payload_json = 5;
}

message RoomEndReq {
  string reason = 1;
}

message RoomEndRes {
  bool ok = 1;
  string room_id = 2;
  string error_code = 3;
}

message RoomMember {
  // Ticket-bound gameplay character id.
  string character_id = 1;
  bool ready = 2;
  bool is_owner = 3;
  bool offline = 4;
  MemberRole role = 5;
}

message RoomSnapshot {
  string room_id = 1;
  // Ticket-bound gameplay character id.
  string owner_character_id = 2;
  string state = 3;
  repeated RoomMember members = 4;
  uint32 current_frame_id = 5;
  string game_state = 6;
}

message EntityTransform {
  uint64 entity_id = 1;
  // Ticket-bound gameplay character id.
  string character_id = 2;
  int32 scene_id = 3;
  float x = 4;
  float y = 5;
  float dir_x = 6;
  float dir_y = 7;
  bool moving = 8;
  uint32 last_input_frame = 9;
}

message RoomStatePush {
  string event = 1;
  RoomSnapshot snapshot = 2;
}

message MovementSnapshotPush {
  string room_id = 1;
  uint32 frame_id = 2;
  repeated EntityTransform entities = 3;
  bool full_sync = 4;
  string reason = 5;
  MovementCorrectionKind correction_kind = 6;
  MovementCorrectionReason reason_code = 7;
  // Character ids targeted by this correction push. Empty means broadcast.
  repeated string target_character_ids = 8;
  uint32 reference_frame_id = 9;
}

message MovementRejectPush {
  string room_id = 1;
  uint32 frame_id = 2;
  // Ticket-bound gameplay character id.
  string character_id = 3;
  string error_code = 4;
  EntityTransform corrected = 5;
  MovementCorrectionKind correction_kind = 6;
  MovementCorrectionReason reason_code = 7;
  uint32 reference_frame_id = 8;
  bool has_client_state = 9;
  float client_x = 10;
  float client_y = 11;
  float server_x = 12;
  float server_y = 13;
}

message MovementRecoveryState {
  uint32 frame_id = 1;
  repeated EntityTransform entities = 2;
  MovementCorrectionKind correction_kind = 3;
  MovementCorrectionReason reason_code = 4;
  uint32 reference_frame_id = 5;
  bool aoi_enabled = 6;
  float aoi_radius = 7;
}

message RoomJoinAsObserverReq {
  string room_id = 1;
}

message RoomJoinAsObserverRes {
  bool ok = 1;
  string room_id = 2;
  string error_code = 3;
  RoomSnapshot snapshot = 4;
  uint32 current_frame_id = 5;
  repeated FrameInput recent_inputs = 6;
  uint32 waiting_frame_id = 7;
  repeated FrameInput waiting_inputs = 8;
  uint32 input_delay_frames = 9;
  MovementRecoveryState movement_recovery = 10;
}

// Reconnect uses the authenticated ticket-bound character; no identity is supplied by the client.
message RoomReconnectReq {
  // Last applied CharacterPushMeta.sequence for the authenticated character.
  // The server only uses this as a cursor for the current ticket-bound character.
  uint64 last_character_push_sequence = 1;
}

message RoomReconnectRes {
  bool ok = 1;
  string room_id = 2;
  string error_code = 3;
  RoomSnapshot snapshot = 4;
  uint32 current_frame_id = 5;
  repeated FrameInput recent_inputs = 6;
  uint32 waiting_frame_id = 7;
  repeated FrameInput waiting_inputs = 8;
  uint32 input_delay_frames = 9;
  MovementRecoveryState movement_recovery = 10;
}

enum RoomMigrationState {
  ROOM_MIGRATION_STATE_OWNED_BY_OLD = 0;
  ROOM_MIGRATION_STATE_DRAINING_ON_OLD = 1;
  ROOM_MIGRATION_STATE_FROZEN_FOR_TRANSFER = 2;
  ROOM_MIGRATION_STATE_IMPORTING_TO_NEW = 3;
  ROOM_MIGRATION_STATE_OWNED_BY_NEW = 4;
  ROOM_MIGRATION_STATE_TRANSFER_FAILED = 5;
  ROOM_MIGRATION_STATE_RETIRED_ON_OLD = 6;
}

message ServerRedirectPush {
  string reason = 1;
  string room_id = 2;
  string rollout_epoch = 3;
  bool reconnect_required = 4;
  uint32 retry_after_ms = 5;
  string target_host = 6;
  uint32 target_port = 7;
  string target_server_id = 8;
  string transport = 9;
}

enum AuthorityKind {
  AUTHORITY_KIND_SERVER = 0;
  AUTHORITY_KIND_CLIENT = 1;
  AUTHORITY_KIND_LOCAL = 2;
}

message AuthorityEndpoint {
  AuthorityKind kind = 1;
  string authority_id = 2;
  // Ticket-bound gameplay character id when authority is character-scoped.
  string character_id = 3;
  string host = 4;
  uint32 port = 5;
  string transport = 6;
  string room_id = 7;
  uint64 authority_epoch = 8;
}

message AuthorityInput {
  // Ticket-bound gameplay character id.
  string character_id = 1;
  uint32 frame_id = 2;
  string action = 3;
  string payload_json = 4;
}

message AuthoritySnapshot {
  string room_id = 1;
  uint64 authority_epoch = 2;
  uint32 frame_id = 3;
  // Ticket-bound gameplay character id for the current authority holder.
  string authority_character_id = 4;
  repeated string character_ids = 5;
  string game_state_json = 6;
  string checksum = 7;
}

message AuthorityMigrationPayload {
  string room_id = 1;
  uint64 authority_epoch = 2;
  uint32 frozen_frame_id = 3;
  AuthorityEndpoint old_authority = 4;
  AuthorityEndpoint new_authority = 5;
  AuthoritySnapshot snapshot = 6;
  repeated AuthorityInput pending_inputs = 7;
  string logic_state_json = 8;
  string runtime_state_json = 9;
  string checksum = 10;
}

message AuthorityMigrationStartPush {
  string reason = 1;
  AuthorityMigrationPayload payload = 2;
  bool reconnect_required = 3;
  uint32 retry_after_ms = 4;
}

message AuthorityMigrationCompletePush {
  string room_id = 1;
  uint64 authority_epoch = 2;
  AuthorityEndpoint authority = 3;
  AuthoritySnapshot snapshot = 4;
}

message RoomTransferPayload {
  string rollout_epoch = 1;
  string room_id = 2;
  uint64 room_version = 3;
  string policy_id = 4;
  // Ticket-bound gameplay character id.
  string owner_character_id = 5;
  string room_phase = 6;
  uint32 current_frame_id = 7;
  uint32 last_applied_frame_id = 8;
  RoomSnapshot snapshot = 9;
  repeated FrameInput recent_inputs = 10;
  uint32 waiting_frame_id = 11;
  repeated FrameInput waiting_inputs = 12;
  string movement_state_json = 13;
  string logic_state_json = 14;
  string runtime_timers_json = 15;
  string match_id = 16;
  string checksum = 17;
}

message FreezeRoomForTransferReq {
  string rollout_epoch = 1;
  string room_id = 2;
}

message FreezeRoomForTransferRes {
  bool ok = 1;
  string room_id = 2;
  string error_code = 3;
  RoomMigrationState migration_state = 4;
  uint64 room_version = 5;
}

message ExportRoomTransferReq {
  string rollout_epoch = 1;
  string room_id = 2;
}

message ExportRoomTransferRes {
  bool ok = 1;
  string room_id = 2;
  string error_code = 3;
  RoomTransferPayload payload = 4;
  string checksum = 5;
}

message ImportRoomTransferReq {
  RoomTransferPayload payload = 1;
}

message ImportRoomTransferRes {
  bool ok = 1;
  string room_id = 2;
  string error_code = 3;
  string checksum = 4;
  uint64 room_version = 5;
}

message ConfirmRoomOwnershipReq {
  string rollout_epoch = 1;
  string room_id = 2;
  string checksum = 3;
  uint64 room_version = 4;
}

message ConfirmRoomOwnershipRes {
  bool ok = 1;
  string room_id = 2;
  string error_code = 3;
  string checksum = 4;
  uint64 room_version = 5;
}

message RetireTransferredRoomReq {
  string rollout_epoch = 1;
  string room_id = 2;
  string checksum = 3;
}

message RetireTransferredRoomRes {
  bool ok = 1;
  string room_id = 2;
  string error_code = 3;
}

message GetRolloutDrainStatusReq {}

message RoomRouteStatus {
  string room_id = 1;
  string owner_server_id = 2;
  RoomMigrationState migration_state = 3;
  uint32 member_count = 4;
  uint32 online_member_count = 5;
  uint64 empty_since_ms = 6;
  uint64 room_version = 7;
}

message GetRolloutDrainStatusRes {
  bool ok = 1;
  string error_code = 2;
  string rollout_epoch = 3;
  string owner_server_id = 4;
  uint64 owned_room_count = 5;
  uint64 migrating_room_count = 6;
  uint64 connection_count = 7;
  repeated RoomRouteStatus routes = 8;
  bool drain_mode_enabled = 9;
  uint64 drain_mode_entered_at_ms = 10;
  uint64 transferable_empty_room_count = 11;
  repeated RoomRouteStatus transferable_empty_room_samples = 12;
  string drain_mode_reason = 13;
  string drain_mode_source = 14;
  uint64 retired_room_count = 15;
}

message TriggerServerRedirectReq {
  string room_id = 1;
  string rollout_epoch = 2;
  string reason = 3;
  string target_host = 4;
  uint32 target_port = 5;
  string target_server_id = 6;
  string transport = 7;
  uint32 retry_after_ms = 8;
}

message TriggerServerRedirectRes {
  bool ok = 1;
  string room_id = 2;
  string error_code = 3;
  uint64 delivered_count = 4;
  uint64 failed_count = 5;
  uint64 online_member_count = 6;
}

message TriggerRolloutDrainNoticeReq {
  string room_id = 1;
  string rollout_epoch = 2;
  string reason = 3;
  string message = 4;
  uint32 retry_after_ms = 5;
  uint64 deadline_ms = 6;
}

message TriggerRolloutDrainNoticeRes {
  bool ok = 1;
  string room_id = 2;
  string error_code = 3;
  uint64 delivered_count = 4;
  uint64 failed_count = 5;
  uint64 online_member_count = 6;
}

message RequestServerShutdownReq {
  string reason = 1;
}

message RequestServerShutdownRes {
  bool ok = 1;
  string error_code = 2;
  uint64 connection_count = 3;
  uint64 owned_room_count = 4;
  uint64 migrating_room_count = 5;
  bool drain_mode_enabled = 6;
  uint64 retired_room_count = 7;
}

message RoomMemberOfflinePush {
  string room_id = 1;
  // Ticket-bound gameplay character id.
  string character_id = 2;
  bool offline = 3;
}

message CreateMatchedRoomReq {
  string match_id = 1;
  string room_id = 2;
  repeated string character_ids = 3;
  string mode = 4;
}

message CreateMatchedRoomRes {
  bool ok = 1;
  string room_id = 2;
  string error_code = 3;
  // Snapshot uses character ids for members and ownership.
  RoomSnapshot snapshot = 4;
}

message ErrorRes {
  string error_code = 1;
  string message = 2;
}

// ========== 物品基础结构 ==========

message Item {
  uint64 uid = 1;
  int32 item_id = 2;
  uint32 count = 3;
  bool binded = 4;
}

message AttrPanel {
  int64 hp = 1;
  int64 max_hp = 2;
  int64 attack = 3;
  int64 defense = 4;
  int32 speed = 5;
  float crit_rate = 6;
  float crit_dmg = 7;
}

message AttrRecord {
  string source = 1;
  string attr_type = 2;
  int32 value = 3;
}

// ========== 物品操作 ==========

message ItemEquipReq {
  uint64 item_uid = 1;
  string equip_slot = 2;
}

message ItemEquipRes {
  bool ok = 1;
  string error_code = 2;
  Item unequipped_item = 3;
}

message ItemUseReq {
  uint64 item_uid = 1;
}

message ItemUseRes {
  bool ok = 1;
  string error_code = 2;
  int64 hp_change = 3;
  repeated int32 new_buff_ids = 4;
}

message ItemDiscardReq {
  uint64 item_uid = 1;
  uint32 count = 2;
}

message ItemDiscardRes {
  bool ok = 1;
  string error_code = 2;
}

// Message ids 1407 and 1408 are permanently reserved for the retired player-side ItemAdd
// request/response. They intentionally have no protobuf payload and must never be reused.
message WarehouseAccessReq {
  string action = 1;
  uint64 item_uid = 2;
  uint32 count = 3;
}

message WarehouseAccessRes {
  bool ok = 1;
  string error_code = 2;
}

message GetInventoryReq {
}

message GetInventoryRes {
  bool ok = 1;
  string error_code = 2;
  repeated Item inventory_items = 3;
  repeated Item warehouse_items = 4;
}

message ElementValues {
  int32 earth = 1;
  int32 fire = 2;
  int32 water = 3;
  int32 wind = 4;
}

message CharacterElements {
  ElementValues affinity = 1;
  ElementValues mastery = 2;
}

message CharacterPushMeta {
  // Ticket-bound gameplay character id. Clients cannot choose this receiver.
  string character_id = 1;
  uint64 sequence = 2;
  uint64 revision = 3;
  string source_type = 4;
  string source_id = 5;
  string action = 6;
  string summary = 7;
  bool snapshot_compensation = 8;
}

message GetCharacterElementsReq {
}

message GetCharacterElementsRes {
  bool ok = 1;
  string error_code = 2;
  string character_id = 3;
  CharacterElements elements = 4;
}

message DebugApplyCharacterElementChangeReq {
  ElementValues affinity_delta = 1;
  ElementValues mastery_delta = 2;
  string reason = 3;
  string debug_token = 4;
}

message DebugApplyCharacterElementChangeRes {
  bool ok = 1;
  string error_code = 2;
  string character_id = 3;
  CharacterElements before = 4;
  CharacterElements after = 5;
}

message CharacterTitleDefinitionSummary {
  string id = 1;
  string name = 2;
  string type = 3;
  string rarity = 4;
  string icon = 5;
  string color = 6;
  repeated string tags = 7;
  bool hidden = 8;
  bool limited = 9;
  int32 sort_order = 10;
}

message CharacterTitleSummary {
  CharacterTitleDefinitionSummary definition = 1;
  bool owned = 2;
  bool equipped = 3;
  string source_type = 4;
  string source_id = 5;
  string unlocked_at = 6;
  string expires_at = 7;
  bool expired = 8;
}

message GetCharacterTitlesReq {
}

message GetCharacterTitlesRes {
  bool ok = 1;
  string error_code = 2;
  string character_id = 3;
  repeated CharacterTitleSummary titles = 4;
  CharacterTitleSummary equipped_title = 5;
}

message EquipCharacterTitleReq {
  string title_id = 1;
}

message EquipCharacterTitleRes {
  bool ok = 1;
  string error_code = 2;
  string character_id = 3;
  CharacterTitleSummary equipped_title = 4;
}

message CharacterDisciplineSummary {
  string discipline_id = 1;
  int64 points = 2;
  string tier = 3;
  bool active = 4;
  string learned_at = 5;
  string updated_at = 6;
}

message CharacterDisciplineDefinitionSummary {
  string discipline_id = 1;
  string name = 2;
  string description = 3;
  string initial_tier = 4;
  int64 initial_points = 5;
  repeated string skill_pool = 6;
  repeated string interaction_permissions = 7;
  string display_fields_json = 8;
}

message DisciplineItemCost {
  uint64 item_uid = 1;
  int32 item_id = 2;
  uint32 count = 3;
}

message GetCharacterDisciplinesReq {
}

message GetCharacterDisciplinesRes {
  bool ok = 1;
  string error_code = 2;
  string character_id = 3;
  repeated CharacterDisciplineSummary disciplines = 4;
}

message LearnCharacterDisciplineReq {
  string discipline_id = 1;
}

message LearnCharacterDisciplineRes {
  bool ok = 1;
  string error_code = 2;
  string character_id = 3;
  CharacterDisciplineSummary discipline = 4;
  CharacterDisciplineDefinitionSummary definition = 5;
  repeated DisciplineItemCost consumed_items = 6;
  repeated string active_skill_pool = 7;
  repeated CharacterTitleSummary unlocked_titles = 8;
}

message SetCharacterDisciplineActiveReq {
  string discipline_id = 1;
  bool active = 2;
}

message SetCharacterDisciplineActiveRes {
  bool ok = 1;
  string error_code = 2;
  string character_id = 3;
  CharacterDisciplineSummary discipline = 4;
  repeated CharacterDisciplineSummary disciplines = 5;
  repeated string active_skill_pool = 6;
  repeated CharacterTitleSummary unlocked_titles = 7;
}

message SwitchCharacterDisciplineReq {
  string discipline_id = 1;
}

message SwitchCharacterDisciplineRes {
  bool ok = 1;
  string error_code = 2;
  string character_id = 3;
  CharacterDisciplineSummary discipline = 4;
  repeated CharacterDisciplineSummary disciplines = 5;
  repeated string active_skill_pool = 6;
  repeated CharacterTitleSummary unlocked_titles = 7;
}

message AddCharacterDisciplinePointsReq {
  string discipline_id = 1;
  int64 points_delta = 2;
}

message AddCharacterDisciplinePointsRes {
  bool ok = 1;
  string error_code = 2;
  string character_id = 3;
  CharacterDisciplineSummary discipline = 4;
  repeated CharacterDisciplineSummary disciplines = 5;
  repeated string active_skill_pool = 6;
  repeated CharacterTitleSummary unlocked_titles = 7;
}

message ApplyCharacterProgressReq {
  string progress_id = 1;
}

message CharacterProgressRewardSummary {
  string reward_type = 1;
  string reward_id = 2;
  string status = 3;
  CharacterTitleSummary title = 4;
  CharacterDisciplineSummary discipline = 5;
  string eligibility = 6;
}

message ApplyCharacterProgressRes {
  bool ok = 1;
  string error_code = 2;
  string character_id = 3;
  bool applied = 4;
  string progress_id = 5;
  string source_type = 6;
  string source_id = 7;
  repeated CharacterProgressRewardSummary rewards = 8;
}

message DebugCharacterTitleReq {
  string action = 1;
  string title_id = 2;
  string discipline_id = 3;
  string discipline_tier = 4;
  int64 discipline_points = 5;
  bool discipline_active = 6;
  bool trigger_unlock_check = 7;
  string reason = 8;
  string debug_token = 9;
  string expires_at = 10;
}

message DebugCharacterTitleRes {
  bool ok = 1;
  string error_code = 2;
  string character_id = 3;
  string action = 4;
  CharacterTitleSummary title = 5;
  CharacterDisciplineSummary discipline = 6;
  repeated CharacterTitleSummary unlocked_titles = 7;
}

// ========== 推送消息 ==========

message InventoryUpdatePush {
  repeated Item inventory_items = 1;
  repeated Item warehouse_items = 2;
}

message CharacterElementsChangePush {
  CharacterPushMeta meta = 1;
  CharacterElements before = 2;
  CharacterElements after = 3;
}

message CharacterTitleChangePush {
  CharacterPushMeta meta = 1;
  CharacterTitleSummary title = 2;
  repeated CharacterTitleSummary titles = 3;
  CharacterTitleSummary equipped_title = 4;
}

message CharacterDisciplineChangePush {
  CharacterPushMeta meta = 1;
  CharacterDisciplineSummary discipline = 2;
  repeated CharacterDisciplineSummary disciplines = 3;
  repeated string active_skill_pool = 4;
  repeated CharacterTitleSummary unlocked_titles = 5;
}

message AttrChangePush {
  AttrPanel base = 1;
  repeated AttrRecord bonus = 2;
  AttrPanel final_ = 3;
}

message VisualChangePush {
  uint32 appearance = 1;
  repeated int32 active_buff_ids = 2;
}

message ItemObtainPush {
  repeated Item items = 1;
  string source = 2;
}

message SessionKickPush {
  string reason = 1;
  int64 timestamp = 2;
}
