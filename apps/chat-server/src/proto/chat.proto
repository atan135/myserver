syntax = "proto3";

package myserver.chat;

// ============================================================
// 聊天系统消息定义
// ============================================================

// --- 认证 ---
message ChatAuthReq {
  string player_id = 1;
  string token = 2;
}

message ChatAuthRes {
  bool ok = 1;
  string error_code = 2;
}

// --- 通用错误响应 ---
message ErrorRes {
  string error_code = 1;
  string message = 2;
}

// --- 单聊 ---
message ChatPrivateReq {
  string target_id = 1;    // 接收者用户ID
  string content = 2;
}

message ChatPrivateRes {
  bool ok = 1;
  string error_code = 2;
  string msg_id = 3;
}

// --- 群聊 ---
message ChatGroupReq {
  string group_id = 1;
  string content = 2;
}

message ChatGroupRes {
  bool ok = 1;
  string error_code = 2;
  string msg_id = 3;
}

// --- 消息推送 ---
message ChatPush {
  string msg_id = 1;
  int32 chat_type = 2;     // 1=私聊, 2=群聊
  string sender_id = 3;
  string sender_name = 4;
  string content = 5;
  int64 timestamp = 6;
  string target_id = 7;    // 私聊时为对方用户ID
  string group_id = 8;     // 群聊时为群组ID
}

// --- 群组管理 ---
message GroupCreateReq {
  string name = 1;
}

message GroupCreateRes {
  bool ok = 1;
  string group_id = 2;
  string error_code = 3;
}

message GroupJoinReq {
  string group_id = 1;
}

message GroupJoinRes {
  bool ok = 1;
  string error_code = 2;
}

message GroupLeaveReq {
  string group_id = 1;
}

message GroupLeaveRes {
  bool ok = 1;
  string error_code = 2;
}

message GroupDismissReq {
  string group_id = 1;
}

message GroupDismissRes {
  bool ok = 1;
  string error_code = 2;
}

message GroupListReq {}

message GroupListRes {
  repeated GroupInfo groups = 1;
}

message GroupInfo {
  string group_id = 1;
  string name = 2;
  int32 member_count = 3;
}

// --- 历史消息查询 ---
message ChatHistoryReq {
  int32 chat_type = 1;     // 1=私聊, 2=群聊
  string target_id = 2;    // 对方用户ID 或 群组ID
  int64 before_time = 3;  // 时间戳，获取此时间之前的消息
  int32 limit = 4;        // 最多返回条数
}

message ChatHistoryRes {
  repeated ChatPush messages = 1;
}

// --- 邮件通知推送 ---
message MailNotifyPush {
  string mail_id = 1;
  string title = 2;
  string from_player_id = 3;
  string mail_type = 4;      // system, player, etc.
  int64 created_at = 5;
}
